services:
  backend:
    build:
      context: ./fairbite-backend
    env_file:
      - ./fairbite-backend/.env
    environment:
      CORS_ALLOW_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./fairbite-frontend
      args:
        REACT_APP_API_BASE: ${REACT_APP_API_BASE:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
