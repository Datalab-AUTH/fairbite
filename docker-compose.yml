services:
  backend:
    build:
      context: ./fairbite-backend
    env_file:
      - path: ./fairbite-backend/.env
        required: false
    environment:
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./fairbite-frontend
      args:
        REACT_APP_API_BASE: ${REACT_APP_API_BASE:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
